    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding-bottom: 60px; }
        
        /* Navbar & Language Switcher */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); sticky: top; position: -webkit-sticky; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #b32d2e; }
        .lang-btn { background: #b32d2e; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        /* Hero Header */
        header { text-align: center; padding: 40px 20px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://unsplash.com') center/cover; color: white; }
        header h1 { font-size: 32px; margin-bottom: 5px; }
        header p { font-size: 16px; opacity: 0.9; }

        /* Container */
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        
        /* Category Titles */
        .category-title { margin: 30px 0 15px 0; color: #2c3e50; border-left: 5px solid #b32d2e; padding-left: 10px; font-size: 22px; }
        
        /* 2-Column Responsive Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 650px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
        
        /* Menu Cards */
        .menu-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; transition: transform 0.2s; }
        .menu-card:hover { transform: translateY(-3px); }
        .menu-img { width: 100%; height: 200px; object-fit: cover; }
        .menu-details { padding: 15px; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .menu-info h3 { font-size: 18px; color: #222; margin-bottom: 5px; }
        .menu-info p { font-size: 14px; color: #777; margin-bottom: 12px; line-height: 1.4; }
        
        /* Price and Action Row */
        .card-action { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-size: 18px; font-weight: bold; color: #b32d2e; }
        .order-btn { background: #25D366; color: white; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .order-btn:hover { background: #20ba5a; }

        footer { text-align: center; padding: 30px; color: #888; font-size: 14px; }
    </style>
