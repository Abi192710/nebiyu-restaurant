<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebiyu Restaurant</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}
h1{
background:#d4a017;
color:white;
padding:20px;
margin:0;
}
.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.item{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px gray;
}
img{
width:100%;
border-radius:10px;
}
</style>
</head>
<body>

<h1>ነቢዩ ሬስቶራንት<br>Nebiyu Restaurant</h1>

<div class="menu">

<div class="item">
<img src="https://via.placeholder.com/200">
<h3>ክትፎ</h3>
<p>500 ብር</p>
</div>

<div class="item">
<img src="https://via.placeholder.com/200">
<h3>ጥብስ</h3>
<p>450 ብር</p>
</div>

</div>

</body>
</html>
